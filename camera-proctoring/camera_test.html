<!DOCTYPE html>
<html>
<head>
    <title>Camera Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        video { width: 640px; height: 480px; border: 2px solid #333; }
        button { padding: 10px 20px; margin: 10px; }
        .status { padding: 10px; margin: 10px 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Camera Proctoring Test</h1>
    
    <div id="status" class="status">Checking camera...</div>
    
    <video id="video" autoplay playsinline></video>
    
    <div>
        <button onclick="startCamera()">Start Camera</button>
        <button onclick="stopCamera()">Stop Camera</button>
        <button onclick="testProctoring()">Test Proctoring Service</button>
    </div>

    <script>
        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 } 
                });
                document.getElementById('video').srcObject = stream;
                updateStatus('Camera started successfully', 'success');
            } catch (err) {
                updateStatus('Camera error: ' + err.message, 'error');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                document.getElementById('video').srcObject = null;
                updateStatus('Camera stopped', 'success');
            }
        }

        async function testProctoring() {
            try {
                const response = await fetch('http://localhost:5001/health');
                const data = await response.json();
                updateStatus('Proctoring service: ' + JSON.stringify(data), 'success');
            } catch (err) {
                updateStatus('Proctoring service error: ' + err.message, 'error');
            }
        }

        function updateStatus(msg, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = msg;
        }

        // Auto-start camera on page load
        startCamera();
    </script>
</body>
</html>
